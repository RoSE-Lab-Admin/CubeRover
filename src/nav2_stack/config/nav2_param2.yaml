bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 500.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 30.0
    costmap_update_timeout: 0.3 # timeout value for costmap to be updated
    use_realtime_priority: false # adds real time prioritization to controller server, will set as higher priority
    publish_zero_velocity: true # whether to publish zero vel command on goal exit
    min_x_velocity_threshold: 0.0001 # velocity commands below this will be sent to 0
    min_y_velocity_threshold: 0.0001 
    min_theta_velocity_threshold: 0.0001
    failure_tolerance: 0.0 # min duration in seconds the controller plugin can fail, 0 means disabled
    odom_topic: /odometry/filtered
    odom_duration: 0.3 # time to buffer odom commands to estimate speed
    enable_stamped_cmd_vel: true
    bond_heartbeat_period: 0.25 # lifecycle bond mechanism publishing periof
    introspection_mode: "disabled" # introspection mode for services and actions
    allow_parameter_qos_overrides: true # wheter to allow QoS profiles to be overwritten w parameter vals
    search_window: 2.0 # how far along the path the searching algorithm will look for closest point

    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5 # min amount a robot must move to be progressing to goal
      movement_time_allowance: 10.0 # max time robot has to move min radius

    goal_checker:
      plugin: "nav2_controller::PositionGoalChecker"
      xy_goal_tolerance: 0.25
      stateful: true
      
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.1 # should match roseybot_control frequency
      batch_size: 2000
      vx_std: 0.2 # speed standard deviations
      wz_std: 0.5
      vx_max: 0.3 # max/min speeds
      vx_min: -0.3
      wz_max: 0.635
      ax_max: 0.1 # max/min accelerations
      ax_min: -0.1
      az_max: 0.211666666667
      iteration_count: 1
      temperature: 0.3 # selectiveness of trajectories by their costs
      gamma: 0.015 # guide says you prob wont need to change
      motion_model: "DiffDrive"
      visualize: false # allows you to see possible paths in rviz
      critic_index_to_visualize: 0
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator: # makes sure the final path doesnt hit obstacles
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: false
      critics: ["ConstraintCritic", "GoalCritic", "ObstaclesCritic", "CostCritic", "PathFollowCritic", "VelocityDeadbandCritic"]
      ConstraintCritic: # Penalizes paths outside of set dynamics or kinematic constraints
        enabled: true
        cost_weight: 4.0 # weight to apply to term
        cost_power: 1 # power order to apply to term
      GoalCritic: # incentivizes navigating towards goal when in reasonable proximity
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5 # min distance to robot and goal where goal cost considered, should be same as predeiction horizon
      ObstaclesCritic: # incentives navigating away from obstacles using distances from obstacles
        enabled: true
        critical_weight: 20.0 # weight to apply critic for near collisions closer than collision_margin_distance
        repulsion_weight: 1.5 # weight for preferring lower cost routes
        cost_power: 1 # power order
        consider_footprint: false # whether to use point cost (if robot circular)
        collision_cost: 100000.0 # cost to apply to a true trajectory collision
        collision_margin_distance: 0.10 # margin distance from collision to apply severe penality
        near_goal_distance: 0.50 # distance near goal to stop applying preferential obstacle term
        cost_scaling_factor: 10.0 # exponential decay factor across inflation radius
        inflation_radius: 0.55 # radius to inflate costmap around lethal obstacles
        inflation_layer_name: ""
      CostCritic: # incentivizes navigating away from obstacles using costmap values
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        consider_footprint: false
        collision_cost: 1000000.0
        near_collision_cost: 253 # costmap cost value to set a max proximity for avoidance
        critical_cost: 0.50 # distance near goal to stop applying perferential obstacle term
        inflation_layer_name: ""
        trajectory_point_step: 2 # the step to take in trajectories for evaluating in critic
      PathFollowCritic: # incentivizes making progress along path
        enabled: true
        cost_weight: 5.0
        cost_power: 1
        threshold_to_consider: 0.5 # distance between robot and goal to stop considering path following and let goal critic take over
        offset_from_furthest: 6 # number of path points after furthest one any trajectory achieves to drive path tracking relative to
      VelocityDeadbandCritic: # penalizes velocities that fall below deadband threshold
        enabled: true
        cost_weight: 35.0 
        deadband_velocities: [0.05, 0.05, 0.05] # [vx, vy, vw]

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false # whether to downsample costmap to another resolution for search
      allow_unknown: true # Whether to allow traversing/search in unknown space
      tolerance: 0.25 # if an exact path cant be found, the tolerance that would be acceptalbe to diverge from pose
      max_iterations: 1000000 # max number of search iterations before failing to limit compute time
      max_on_approach_iterations: 1000 # max num of iterations once a visited node is within the goal tolerances to continue to find an exact match
      terminal_checking_interval: 5000 # num of iterations between checking if the goal has been cancelled or planner timed out 
      max_planning_time: 5.0 # max planning time in seconds
      analytic_expansion_ratio:  3.5 # planner will attempt to complete an analytic expansions in a frequency proportional to this value and the min heuristic
      analytic_expansion_max_length: 3.0 # if the length is too far reject the expansion
      analytic_expansion_max_cost: 200.0 # for hybrid/lattice nodes: max cost for any part of an analytic expansion to contain and be considered valid
      analytic_expansion_max_cost_ovveride: false # for hybrid/lattice nodes: whether or not to overrid max cost setting if w/i critical dist to goaL
      minimum_turning_radius: 0.5 # min turning radius of path in m (must be >= vx_max/wz_max = 0.3/0.635 ≈ 0.47)
      motion_model_for_search: "DUBIN"
      non_straight_penalty: 1.20 # heuristic penalty to apply to SE2 node if searching in a non straight direction
      cost_penalty: 2.0 # heuristic penalty to apply to SE2 node for cost at pose
      retrospective_penalty: 0.015 # heurstic penality to apply to SE2 node penality
      lookup_table_size: 20.0
      debug_visualizations: false # whether to publish expansions on the /expansions topic as an array of poses and the paths footprints on the /planned_footprints
      use_quadratic_cost_penalty: false
      goal_heading_mode: "ALL_DIRECTION"
      coarse_search_resolution: 4 # number of goal headings bins to skip during coarse search phase 
      smooth_path: true # does simple and fast smoothing post-proccessing to the path
  
      smoother:
        max_iterations: 1000 # the max number of iterations the smoother has smooth the path
        w_smooth: 0.3 # weight for smoother to smooth out data points
        w_data: 0.2 # weight for smoother to apply to retain original data information
        tolerance: 1.0e-10 # parameter tolerance change amount to terminate smoothing session
        do_refinement: true # performs extra refinement smoothing runs
        refinement_num: 2 # number of times to recursively attempt to smooth
        
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.15
      footprint: "[[0.37, 0.23], [0.37, -0.23], [-0.37, -0.23], [-0.37, 0.23]]"
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58 #maybe try 3.0
        inflation_radius: 0.35 #see if this works instead of 0.1
      transform_tolerance: 1.0
      always_send_full_costmap: false
      track_unknown_space: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.37, 0.23], [0.37, -0.23], [-0.37, -0.23], [-0.37, 0.23]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58
        inflation_radius: 1.75
      always_send_full_costmap: false

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    
    spin:
      plugin: "nav2_behaviors::Spin"
      simulate_ahead_time: 2.0
      max_rotational_vel: 0.10
      min_rotational_vel: 0.01
      rotational_acc_lim: 1.0
    
    backup:
      plugin: "nav2_behaviors::BackUp"
      simulate_ahead_time: 2.0
      backup_dist: -0.30
      backup_speed: -0.10 #(m/s)
      time_allowance: 10.0
    
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      simulate_ahead_time: 2.0
      max_linear_vel: 0.25
      min_linear_vel: 0.05
      linear_acc_lim: 1.0
      max_angular_vel: 0.1
      min_angular_vel: 0.01
      angular_acc_lim: 1.0
      time_allowance: 10.0
    
    wait:
      plugin: "nav2_behaviors::Wait"
    
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
      projection_time: 1.0
      simulation_time_step: 0.1
    
    local_frame: base_link
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.5
    # simulate_ahead_time: 2.0
    # max_rotational_vel: 0.50
    # min_rotational_vel: 0.40
    # rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.635]
    min_velocity: [-0.3, 0.0, -0.635]
    max_accel: [0.1, 0.0, 0.211666666667]
    max_decel: [-0.1, 0.0, -0.211666666667]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 5
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: true
    node_names: ['map_server', 'planner_server', 'controller_server', 
                 'behavior_server', 'bt_navigator', 'waypoint_follower']





        





