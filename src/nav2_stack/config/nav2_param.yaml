bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    

    #change default to custom behavior tree
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_stack)/behavior_trees/navigate_recovery.xml"
    default_nav_through_poses_bt_xml: "$(find-pkg-share nav2_stack)/behavior_trees/navigate_recovery.xml"


    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_pose_action_bt_node
      - nav2_navigate_to_poses_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node
      
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 15.0
    costmap_update_timeout: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    failure_tolerance: 0.3
    odom_topic: /odometry/filtered
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    enable_stamped_cmd_vel: True

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.5
      min_vel_y: -0.5
      max_vel_x: 0.3
      max_vel_y: 0.3
      max_vel_theta: 0.635
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      max_speed_theta: 0.635
      acc_lim_x: 0.3
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -0.5
      decel_lim_y: -0.5
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_granularity: 0.05
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.1
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["BaseObstacleCritic", "GoalDistCritic", "GoalAlignCritic", 
                "PathDistCritic", "PathAlignCritic", "PreferForwardCritic"]
      BaseObstacleCritic:
        enabled: true
        scale: 0.02
      GoalDistCritic:
        enabled: true
        scale: 24.0
        forward_point_distance: 0.1
      GoalAlignCritic:
        enabled: true
        scale: 10.0
        forward_point_distance: 0.1
      PathDistCritic:
        enabled: true
        scale: 32.0
        forward_point_distance: 0.1
      PathAlignCritic:
        enabled: true
        scale: 24.0
        forward_point_distance: 0.1
      PreferForwardCritic:
        enabled: true
        scale: 5.0
      TwirlingCritic:
        enabled: true
        scale: 10.0

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 30.0
    
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.15
      robot_radius: 0.15
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58
        inflation_radius: 0.1
      transform_tolerance: 1.0
      always_send_full_costmap: false
      track_unknown_space: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.15
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58
        inflation_radius: 1.75
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-5
      max_its: 250
      do_refinement: False

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    
    spin:
      plugin: "nav2_behaviors::Spin"
      simulate_ahead_time: 2.0
      max_rotational_vel: 0.50
      min_rotational_vel: 0.40
      rotational_acc_lim: 3.2
    
    backup:
      plugin: "nav2_behaviors::BackUp"
      simulate_ahead_time: 2.0
      backup_dist: -0.30
      backup_speed: -0.10 #(m/s)
      time_allowance: 10.0
    
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      simulate_ahead_time: 2.0
      max_linear_vel: 0.25
      min_linear_vel: 0.10
      linear_acc_lim: 1.0
      max_angular_vel: 0.5
      min_angular_vel: 0.2
      angular_acc_lim: 1.0
      time_allowance: 10.0
    
    wait:
      plugin: "nav2_behaviors::Wait"
    
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
      projection_time: 1.0
      simulation_time_step: 0.1
    
    local_frame: base_link
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    # simulate_ahead_time: 2.0
    # max_rotational_vel: 0.50
    # min_rotational_vel: 0.40
    # rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: True

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 5
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, .635]
    min_velocity: [-0.5, 0.0, -2.5]
    max_accel: [0.3, 0.3, 3.2]
    max_decel: [-0.5, -0.5, -3.2]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    enable_stamped_cmd_vel: True

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: true
    node_names: ['map_server', 'planner_server', 'controller_server', 'smoother_server', 
                 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']