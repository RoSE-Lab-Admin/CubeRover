bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    

      
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    costmap_update_timeout: 0.1
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    failure_tolerance: 1.0
    odom_topic: /odometry/filtered
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    enable_stamped_cmd_vel: True

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Rotation shim params
      angular_dist_threshold: 0.2
      forward_sampling_distance: 0.2   # reduced: at 0.1 m/s, 0.5m is 5+ seconds ahead
      angular_disengage_threshold: 0.15
      rotate_to_heading_angular_vel: 0.05
      max_angular_accel: 0.4   # reduced for high-slip surface
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: false

      # rpp params

      desired_linear_vel: 0.08
      lookahead_dist: 0.3
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.05
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.01
      approach_velocity_scaling_dist: 0.3
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true   # slows on curves, important for high-slip
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.01
      allow_reversing: false
      use_rotate_to_heading: false
      rotate_to_heading_min_angle: 0.5
      max_angular_accel: 0.4   # reduced for high-slip surface
      max_robot_pose_search_dist: 10.0

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 60.0
    
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.52

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.15
      footprint: "[[0.37, 0.23], [0.37, -0.23], [-0.37, -0.23], [-0.37, 0.23]]"
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58 #maybe try 3.0
        inflation_radius: 0.35 #see if this works instead of 0.1
      transform_tolerance: 1.0
      always_send_full_costmap: false
      track_unknown_space: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.37, 0.23], [0.37, -0.23], [-0.37, -0.23], [-0.37, 0.23]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.58
        inflation_radius: 1.75
      always_send_full_costmap: false

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-5
      max_its: 250
      do_refinement: False

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    
    spin:
      plugin: "nav2_behaviors::Spin"
      simulate_ahead_time: 2.0
      max_rotational_vel: 0.10
      min_rotational_vel: 0.01
      rotational_acc_lim: 1.0
    
    backup:
      plugin: "nav2_behaviors::BackUp"
      simulate_ahead_time: 2.0
      backup_dist: -0.30
      backup_speed: -0.10 #(m/s)
      time_allowance: 10.0
    
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
      simulate_ahead_time: 2.0
      max_linear_vel: 0.10
      min_linear_vel: 0.01
      linear_acc_lim: 1.0
      max_angular_vel: 0.1
      min_angular_vel: 0.01
      angular_acc_lim: 1.0
      time_allowance: 10.0
    
    wait:
      plugin: "nav2_behaviors::Wait"
    
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
      projection_time: 1.0
      simulation_time_step: 0.1
    
    local_frame: base_link
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.5
    # simulate_ahead_time: 2.0
    # max_rotational_vel: 0.50
    # min_rotational_vel: 0.40
    # rotational_acc_lim: 3.2
    enable_stamped_cmd_vel: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 5
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.10, 0.0, 0.15]
    min_velocity: [-0.10, 0.0, -0.15]
    max_accel: [0.05, 0.0, 0.4]
    max_decel: [-0.1, 0.0, -0.8]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    enable_stamped_cmd_vel: True

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: True
    autostart: true
    node_names: ['map_server', 'planner_server', 'controller_server', 'smoother_server', 
                 'behavior_server', 'bt_navigator', 'waypoint_follower', 'velocity_smoother']
