
# /clock must always be bridged so ROS nodes get sim time
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# IMU — Gazebo sensor → ROS (replaces physical BNO055 in sim)
- ros_topic_name: /bno055/imu
  gz_topic_name: /imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# Ground-truth pose for nav2 / debugging
- ros_topic_name: /CubeRover_V1/pose
  gz_topic_name: /model/roseybot/pose
  ros_type_name: geometry_msgs/msg/PoseStamped
  gz_type_name: gz.msgs.Pose
  direction: GZ_TO_ROS

# NOTE: /cmd_vel, /joint_states, and /roseybot_base_controller/odom are
# no longer bridged — they are published directly by roseybot_control
# (DiffDriveController and JointStateBroadcaster via gz_ros2_control).
