# This config uses industrial_ci (https://github.com/ros-industrial/industrial_ci.git).
# For troubleshooting, see README (https://github.com/ros-industrial/industrial_ci/blob/master/README.rst)

name: CI Pipeline

on: # this determines when this workflow is run
  push: # runs on all branches by default
    # branches: [ main, jazzy-devel ] #  when master or jazzy-devel branch is pushed to
  # pull_request:
  #   branches: [ main ] # when there is a pull request against master
  # schedule: # uncomment to run periodically
  #  - cron: '0 4 * * *' # every day at 4 AM (UTC)
  workflow_dispatch: # allow manually starting this workflow

jobs:
  industrial_ci:
    name: ${{matrix.NAME}} - ROS ${{ matrix.ROS_DISTRO }} (${{ matrix.ROS_REPO }})
    # runs-on: ubuntu-latest
    strategy:
      fail-fast: false # failing software test should not cancel the hardware tests and vice versa
      matrix: # matrix is the product of entries
        # ROS_DISTRO: [jazzy]
        # ROS_REPO: [testing, main]
        # exclude: # specific configuration can be excludes
        #   - {ROS_DISTRO: humble, ROS_REPO: testing}
        include: # add additional configurations
          #   - {ROS_DISTRO: kinetic, ROS_REPO: testing}
          # Cloud Runner: Standard software tests
          - NAME: "Software Tests (Cloud)"
            RUNS-ON: ubuntu-latest
            RUN-TRIGGERS: "push, workflow_dispatch"
            ROS_DISTRO: jazzy
            ROS_REPO: main
            # Use -m "not hardware" to skip tagged tests
            COLCON_TEST_ARGS: "--pytest-args -m 'not hardware'"

          # Local Runner: Hardware-in-the-loop tests
          - NAME: "Hardware Tests (Local)"
            RUNS-ON: [self-hosted, hardware-local] # TODO: Add this local runner
            RUN-TRIGGERS: "workflow_dispatch"
            ROS_DISTRO: jazzy
            ROS_REPO: main
            # Use -m "hardware" to run only the tagged tests
            COLCON_TEST_ARGS: "--pytest-args -m 'hardware'"
    env:
      CCACHE_DIR: "${{ github.workspace }}/.ccache" # directory for ccache (and how we enable ccache in industrial_ci)
    runs-on: ${{ matrix.RUNS-ON }}
    if: contains(matrix.RUN-TRIGGERS, github.event_name) # Only runs if one of the RUN-TRIGGERS matches the github.event_name
    steps:
      - uses: actions/checkout@v4 # clone target repository
      
      # Note: Cache is important for ensuring that only changed C/C++ files that are recompiled
      - uses: actions/cache@v4 # fetch/store the directory used by ccache before/after the ci run
        with:
          path: ${{ env.CCACHE_DIR }}
          # This configuration will always create a new ccache cache starting off from the previous one (if any).
          # In this simple version it will be shared between all builds of the same ROS_REPO and ROS_REPO
          # and might need some fine-tuning to match the use case
          key: ccache-${{ matrix.ROS_DISTRO }}-${{ matrix.ROS_REPO }}-${{github.run_id}}
          restore-keys: |
            ccache-${{ matrix.ROS_DISTRO }}-${{ matrix.ROS_REPO }}-
      - uses: 'ros-industrial/industrial_ci@master' # run industrial_ci
        env: # either pass all entries explicitly
          ROS_DISTRO: ${{ matrix.ROS_DISTRO }}
          ROS_REPO: ${{ matrix.ROS_REPO }}
          COLCON_TEST_ARGS: ${{ matrix.COLCON_TEST_ARGS }}
        # with: # or pass the full matrix as config
        #    config: ${{toJSON(matrix)}}